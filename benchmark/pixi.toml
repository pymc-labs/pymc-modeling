[workspace]
name = "pymc-skill-benchmark"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.11,<3.14"
numpy = ">=1.24"
polars = ">=1.0"
pyyaml = ">=6.0"
arviz = ">=1.0"
arviz-base = "*"
arviz-stats = "*"
h5netcdf = "*"
scipy = ">=1.10"
matplotlib = ">=3.7"
pytest = ">=9.0"

# PyMC 6 / PyTensor 3 from upstream dev branches (not yet on conda-forge).
# pymc's requirements.txt on the v6 branch already pins pytensor to the v3
# git URL, so pytensor is pulled in transitively. nutpie comes from pypi
# because conda-forge nutpie pins pytensor<3.
[pypi-dependencies]
pymc = { git = "https://github.com/pymc-devs/pymc.git", branch = "v6" }
nutpie = "*"

[tasks]
# Data preparation
prepare-data = "python scripts/prepare_data.py"

# Benchmark commands
run = "python -m src.cli run"
run-all = "python -m src.cli run --all"
score = "python -m src.cli score"
score-all = "python -m src.cli score --all"
analyze = "python -m src.cli analyze"
validate = "python -m src.cli validate"
list-tasks = "python -m src.cli list-tasks"
status = "python -m src.cli status"

# Testing
test = "MPLBACKEND=Agg pytest tests/ -v"
